databases:
  - name: sql-faker-db
    databaseName: fake_contacts
    plan: free

services:
  - type: web
    name: sql-faker-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/init_db.py && gunicorn app.main:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: sql-faker-db
          property: connectionString
