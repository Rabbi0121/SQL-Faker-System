services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fake_contacts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./sql/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql:ro
      - ./sql/003_generators.sql:/docker-entrypoint-initdb.d/003_generators.sql:ro

  web:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fake_contacts
      FLASK_DEBUG: "0"
      PORT: "8000"
    ports:
      - "8000:8000"

volumes:
  pgdata:
